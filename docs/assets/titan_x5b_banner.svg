<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ccff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#bg)" rx="10"/>
  
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#00ff88">
    <line x1="0" y1="40" x2="800" y2="40" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke-width="0.5"/>
  </g>
  
  <!-- Circuit traces -->
  <g opacity="0.15" stroke="#00ccff" stroke-width="1" fill="none">
    <path d="M 0 100 H 80 L 100 80 H 150 L 160 90 H 200"/>
    <path d="M 600 120 H 680 L 700 100 H 750 L 760 110 H 800"/>
    <path d="M 0 150 H 50 L 60 140 H 100"/>
    <path d="M 700 50 H 750 L 760 60 H 800"/>
  </g>
  
  <!-- Chip icon -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="80" rx="5" fill="none" stroke="url(#glow)" stroke-width="2" filter="url(#neon)"/>
    <rect x="15" y="15" width="50" height="50" rx="3" fill="#1a1a3a" stroke="#00ff88" stroke-width="1"/>
    <!-- Pins -->
    <line x1="-10" y1="20" x2="0" y2="20" stroke="#00ccff" stroke-width="2"/>
    <line x1="-10" y1="40" x2="0" y2="40" stroke="#00ccff" stroke-width="2"/>
    <line x1="-10" y1="60" x2="0" y2="60" stroke="#00ccff" stroke-width="2"/>
    <line x1="80" y1="20" x2="90" y2="20" stroke="#00ccff" stroke-width="2"/>
    <line x1="80" y1="40" x2="90" y2="40" stroke="#00ccff" stroke-width="2"/>
    <line x1="80" y1="60" x2="90" y2="60" stroke="#00ccff" stroke-width="2"/>
    <line x1="20" y1="-10" x2="20" y2="0" stroke="#00ccff" stroke-width="2"/>
    <line x1="40" y1="-10" x2="40" y2="0" stroke="#00ccff" stroke-width="2"/>
    <line x1="60" y1="-10" x2="60" y2="0" stroke="#00ccff" stroke-width="2"/>
    <line x1="20" y1="80" x2="20" y2="90" stroke="#00ccff" stroke-width="2"/>
    <line x1="40" y1="80" x2="40" y2="90" stroke="#00ccff" stroke-width="2"/>
    <line x1="60" y1="80" x2="60" y2="90" stroke="#00ccff" stroke-width="2"/>
    <!-- Die label -->
    <text x="40" y="45" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88" font-weight="bold">X5-B</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#glow)" filter="url(#neon)">TITAN X5-B</text>
  <text x="200" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8892b0" letter-spacing="4">BLACKWELL-CLASS GPU ARCHITECTURE</text>
  <text x="200" y="140" font-family="monospace" font-size="13" fill="#00ff88" opacity="0.8">3,030,603 gates · 57 modules · 9,983 lines of RTL</text>
  <text x="200" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#5a6688">Open-Source Silicon · Designed by Adhiraj 🇮🇳 · CERN-OHL-S-2.0</text>
</svg>
