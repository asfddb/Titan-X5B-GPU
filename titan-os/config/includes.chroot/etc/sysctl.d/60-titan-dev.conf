# TitanOS dev-mode kernel tunables (applied by `titan-mode dev`).
# Goal: survive memory pressure from compilers/containers on 2 GB RAM by
# leaning on zram swap rather than the OOM killer.

# Willing to swap sooner — zram makes swap cheap and keeps builds alive.
vm.swappiness = 60

# Allow inotify-heavy tooling (watchers, test runners, editors).
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
