# TitanOS gaming-mode kernel tunables (applied by `titan-mode gaming`).
# Goal: keep as much as possible in RAM and stay responsive under load,
# which matters most on a low-RAM machine.

# Prefer keeping active pages in RAM; swap only when genuinely needed.
vm.swappiness = 10

# Many games (esp. via Proton/Wine) map a lot of memory regions.
vm.max_map_count = 2147483642

# Write dirty pages back more eagerly to avoid big stalls mid-frame.
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
