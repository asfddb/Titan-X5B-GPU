# Managed by titan-cap. Hard RAM ceiling for TitanOS system services.
# This is the shipped safety default (5 GB). On first boot titan-cap.service
# runs `titan-cap auto` and rewrites this to 20% of the machine's real RAM,
# clamped to [2 GB, 5 GB], so the OS never hogs more than its share.
[Slice]
MemoryMax=5120M
MemoryHigh=4608M
