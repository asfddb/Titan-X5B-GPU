# =============================================================================
# GitHub Actions CI Workflow for Titan X5-B GPU
# =============================================================================
#
# This workflow runs on every push and every pull request, and does:
#
#   1. Lint every .v / .sv file with Verilator (warnings → annotations)
#   2. Compile the full RTL with Icarus Verilog (catches syntax errors)
#   3. Run the cocotb test suite (test_system, test_graphics, test_alu)
#   4. Run Yosys synthesis and check the gate count
#   5. Upload waveform + synth report as artifacts
#
# SETUP:
#   1. Copy this file to: .github/workflows/ci.yml in your repo
#   2. Ensure your tb/ folder has a Makefile (cocotb-based)
#   3. The workflow uses Ubuntu 22.04 + apt packages, no secrets needed
#
# BADGES (add to README.md):
#
#   [![CI](https://github.com/asfddb/Titan-X5B-GPU/actions/workflows/ci.yml/badge.svg?branch=master)](https://github.com/asfddb/Titan-X5B-GPU/actions/workflows/ci.yml)
#
# =============================================================================

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint with Verilator
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Verilator)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq verilator

      - name: Verilator version
        run: verilator --version

      - name: Lint all RTL files
        run: |
          set -o pipefail
          mkdir -p reports
          # Whole-design hierarchical lint. Per-file linting can never
          # resolve module hierarchy (every submodule instance reports
          # "cannot find module"), so the design is linted in ONE
          # invocation with titan_x5_gpu_top as the root.
          #
          # titan_x5_fpga_top.v is excluded: it references vendor
          # primitives (BUFG) and a synthesis-only VRAM controller that do
          # not exist as simulation sources.
          #
          # Suppressed categories (cosmetic/stylistic; structural and
          # correctness lints such as TIMESCALEMOD, SYNCASYNCNET,
          # UNOPTFLAT, CASEINCOMPLETE and BLKLOOPINIT remain fatal):
          #   DECLFILENAME/WIDTH      - pre-existing policy
          #   PINCONNECTEMPTY/PINMISSING - deliberate unconnected ports
          #   UNUSED/UNDRIVEN/CMPCONST   - dead-code style in legacy blocks
          #   BLKSEQ                  - blocking assigns in reset-init loops
          #   VARHIDDEN/EOFNEWLINE/IMPLICIT/MULTITOP/LATCH - legacy style
          RTL_FILES=$(find rtl -name '*.v' ! -name 'titan_x5_fpga_top.v' | sort)
          verilator --lint-only -Wall \
            -Wno-DECLFILENAME -Wno-WIDTH \
            -Wno-PINCONNECTEMPTY -Wno-PINMISSING \
            -Wno-UNUSED -Wno-UNDRIVEN -Wno-CMPCONST \
            -Wno-BLKSEQ -Wno-VARHIDDEN -Wno-EOFNEWLINE \
            -Wno-IMPLICIT -Wno-MULTITOP -Wno-LATCH \
            --top-module titan_x5_gpu_top \
            $RTL_FILES 2>&1 | tee reports/verilator_lint.log

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: reports/

  # ---------------------------------------------------------------------------
  # Job 2: Compile with Icarus
  # ---------------------------------------------------------------------------
  compile:
    name: Compile (Icarus)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog

      - name: Icarus version
        run: vvp -V; iverilog -V

      - name: Compile all RTL + testbenches
        run: |
          set -o pipefail
          mkdir -p sim_build
          # titan_x5_fpga_top.v is synthesis-only (Xilinx BUFG + external
          # VRAM controller) and cannot elaborate as a simulation source.
          RTL_FILES=$(find rtl -name '*.v' ! -name 'titan_x5_fpga_top.v' | sort)
          # Collect all testbench files (the tb_*.v driver wrappers)
          TB_FILES=$(find tb -name 'tb_*.v' -o -name 'tb_*.sv' | sort)

          echo "Compiling RTL + testbenches..."
          iverilog -g2012 -DSIMULATION \
            -I rtl \
            -o sim_build/titan_x5b.vvp \
            $TB_FILES $RTL_FILES 2>&1 | tee sim_build/compile.log

          # iverilog emits lowercase "error:"; the old uppercase-only grep
          # silently passed real failures. pipefail above also propagates
          # the compiler's own exit status through tee.
          if grep -qi "error" sim_build/compile.log; then
            echo "❌ Compilation failed"
            exit 1
          fi
          echo "✅ Compilation successful"

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-output
          path: sim_build/

  # ---------------------------------------------------------------------------
  # Job 3: Run cocotb tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (cocotb)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Icarus + cocotb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog
          pip install --quiet cocotb==1.8.1 cocotb-test pytest cocotbext-axi pillow

      - name: Run all cocotb tests
        env:
          cocotb_dir: ${{ github.workspace }}/tb
        run: |
          mkdir -p sim_build reports
          cd tb

          # Run test_runner.py which contains all the cocotb_test definitions
          echo "=============================================="
          echo "Running all cocotb tests via test_runner.py"
          echo "=============================================="

          python -m pytest test_runner.py -v --log-cli-level=INFO 2>&1 | tee "../reports/test_runner.log"

          echo "=============================================="
          echo "Running cocotb tests via Makefile (Graphics, ALU, Cache)"
          echo "=============================================="
          
          set -e
          make clean
          make TEST_TARGET=graphics
          make clean
          make TEST_TARGET=alu
          # (TEST_TARGET=cache removed: it referenced a test_cache module
          # that never existed in tb/, and the L1 has a new MESI interface
          # covered by the cocotb 2.x regression job below.)

          echo "✅ All tests PASSED"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: reports/

      - name: Upload waveforms
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waveforms
          path: |
            tb/*.vcd
            tb/*.fst
            sim_build/*.vcd

  # ---------------------------------------------------------------------------
  # Job 3b: Transaction-based regression (lsu / fpu / mesi / tmu suites)
  # These are the cocotb 2.x suites driven by tb/run_regression.py; they are
  # independent of the legacy Makefile flow above (which pins cocotb 1.8.1).
  # ubuntu-24.04 ships Icarus 12, matching local development.
  # ---------------------------------------------------------------------------
  regression:
    name: Regression (lsu/fpu/mesi/tmu)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Icarus + cocotb 2.x
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog
          pip install --quiet cocotb==2.0.1 cocotb-coverage pytest
          iverilog -V | head -1

      - name: Run regression
        run: python tb/run_regression.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: |
            tb/uvm/*_results.xml
            tb/uvm/*_coverage.yml

  # ---------------------------------------------------------------------------
  # Job 4: Yosys synthesis
  # ---------------------------------------------------------------------------
  synth:
    name: Synthesize (Yosys)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq yosys

      - name: Yosys version
        run: yosys -V

      - name: Run synthesis
        run: |
          mkdir -p syn/reports
          # titan_x5_fpga_top.v excluded: vendor primitives (BUFG) and a
          # synthesis-only VRAM controller; hierarchy is rooted at
          # titan_x5_gpu_top anyway.
          RTL_FILES=$(find rtl -name '*.v' ! -name 'titan_x5_fpga_top.v' | sort | tr '\n' ' ')

          echo "Synthesizing with: $RTL_FILES"

          yosys -p "
            read_verilog -sv $RTL_FILES;
            hierarchy -top titan_x5_gpu_top;
            synth -top titan_x5_gpu_top;
            stat > syn/reports/synthesis_stats.txt;
            write_verilog syn/titan_x5b_synth.v;
          " 2>&1 | tee syn/reports/synthesis.log

          # Fail on ERROR
          if grep -q "ERROR" syn/reports/synthesis.log; then
            echo "❌ Synthesis failed"
            exit 1
          fi

          # Extract and display gate count
          echo ""
          echo "=============================================="
          echo "Synthesis Statistics:"
          echo "=============================================="
          grep -E "Number of cells|Number of wires|Number of memories|Chip area" \
            syn/reports/synthesis_stats.txt || true
          echo "=============================================="

      - name: Upload synthesis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-report
          path: syn/

  # ---------------------------------------------------------------------------
  # Job 5: Coverage (optional, slow)
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'push'  # only on push to main, not PRs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iverilog
          pip install --quiet cocotb==1.8.1 cocotbext-axi pillow cocotb-coverage

      - name: Run coverage
        run: |
          mkdir -p reports/coverage
          cd tb
          # Run tests with coverage enabled
          python -m pytest test_runner.py -v 2>&1 | tee ../reports/coverage/coverage.log || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage/
